<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ครัวคุณแม่ - สั่งอาหาร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-50 pb-24">
    <nav class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <h1 class="text-xl font-bold text-orange-600">ครัวคุณแม่ 🍳</h1>
        <div class="bg-orange-100 px-3 py-1 rounded-full text-orange-600 font-bold">
            🛒 <span id="cart-count">0</span>
        </div>
    </nav>

    <div id="menu-container" class="p-4 grid grid-cols-1 gap-4">
        </div>

    <div class="p-4 bg-white m-4 rounded-2xl shadow-sm border border-orange-50">
        <h2 class="font-bold mb-3">📍 ที่อยู่จัดส่ง</h2>
        <button onclick="getLocation()" id="btn-loc" class="w-full bg-blue-50 text-blue-600 py-3 rounded-xl font-bold border border-blue-100 mb-3">
            คลิกเดียวส่งที่อยู่ปัจจุบัน
        </button>
        <div id="delivery-info" class="text-sm text-center py-2 bg-gray-50 rounded-lg hidden mb-3"></div>
        <textarea id="address-detail" class="w-full border rounded-xl p-3 text-sm focus:outline-orange-500" rows="2" placeholder="รายละเอียดที่อยู่เพิ่มเติม..."></textarea>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-lg flex items-center justify-between">
        <div>
            <p class="text-xs text-gray-500">ราคารวม</p>
            <p class="text-xl font-bold text-orange-600"><span id="total-price-display">0</span>.-</p>
        </div>
        <button onclick="openPaymentModal()" class="bg-orange-600 text-white px-8 py-3 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition">
            สั่งอาหาร
        </button>
    </div>

    <div id="pay-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-4">สแกนจ่ายเงิน</h2>
            <div id="qr-area" class="bg-gray-100 w-48 h-48 mx-auto mb-4 flex items-center justify-center rounded-xl border-2 border-dashed border-gray-300">
                <span class="text-gray-400 text-sm">รอโหลด QR Code...</span>
            </div>
            <p class="text-lg font-bold text-orange-600 mb-4">ยอดโอน: <span id="pay-amount">0</span> บาท</p>
            <div class="text-left mb-4">
                <label class="block text-sm font-bold mb-1">แนบรูปสลิป</label>
                <input type="file" id="slip-input" accept="image/*" class="w-full text-xs">
            </div>
            <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mb-2">ยืนยันส่งออเดอร์</button>
            <button onclick="closeModal()" class="text-gray-400 text-sm">ยกเลิก</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
