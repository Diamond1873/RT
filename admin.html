<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอดมิน - ครัวคุณแม่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">ออเดอร์ใหม่ 🔔</h1>
            <button onclick="toggleStore()" id="store-status" class="bg-green-500 text-white px-6 py-2 rounded-full font-bold shadow-md">ร้านเปิดอยู่</button>
        </div>

        <div id="admin-orders" class="space-y-4 mb-12">
            <p class="text-gray-400 text-center py-10">กำลังรอออเดอร์ใหม่...</p>
        </div>

        <hr class="my-8">

        <div class="bg-white p-6 rounded-3xl shadow-sm">
            <h2 class="text-xl font-bold mb-4">➕ เพิ่มเมนูอาหาร</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="m-name" placeholder="ชื่อเมนู" class="border p-3 rounded-xl">
                <input type="number" id="m-price" placeholder="ราคา" class="border p-3 rounded-xl">
                <button onclick="addMenu()" class="bg-orange-500 text-white py-3 rounded-xl font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // เริ่มระบบ Real-time เมื่อโหลดหน้าแอดมิน
        initAdmin();
    </script>
</body>
</html>
